server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Prevent nginx from appending the internal port (8080) to redirect URLs.
    # Without this, trailing-slash redirects become http://host:8080/path/
    # instead of the public https://host/path/ after Fly's proxy.
    port_in_redirect off;
    absolute_redirect off;

    # Serve clean URLs (try /path/index.html before 404)
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/html text/css application/javascript application/json;
}
