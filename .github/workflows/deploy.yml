name: Deploy Trail Landing to trailmem.com

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Deploy reason'
        default: 'Content update from webhouse.app'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm install

      - name: Fetch content from webhouse.app
        run: node scripts/fetch-webhouse-content.mjs
        env:
          WEBHOUSE_JWT: ${{ secrets.WEBHOUSE_CMS_JWT }}
          WEBHOUSE_URL: https://webhouse.app
          WEBHOUSE_ORG: broberg-ai
          WEBHOUSE_SITE: trail

      - name: Build static site
        run: npx tsx build.ts
        env:
          BUILD_OUT_DIR: deploy

      - name: Install flyctl
        run: |
          curl -L https://fly.io/install.sh | FLYCTL_INSTALL=$HOME/.fly sh
          echo "$HOME/.fly/bin" >> $GITHUB_PATH

      - name: Deploy to Fly.io
        run: flyctl deploy -a trail-landing --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Notify CMS (deploy complete)
        if: always()
        run: |
          STATUS="success"
          if [ "${{ job.status }}" != "success" ]; then STATUS="failure"; fi
          START_TIME="${{ steps.build-and-deploy.startedAt }}"
          ELAPSED=$(( ($(date +%s) - $(date -d "$START_TIME" +%s 2>/dev/null || echo $(date +%s))) ))
          curl -s -X POST "${{ vars.CMS_BASE_URL }}/api/admin/deploy/notify" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_NOTIFY_SECRET }}" \
            -d "{\"status\":\"$STATUS\",\"url\":\"https://trailmem.com\",\"app\":\"trail-landing\",\"duration\":$ELAPSED}" \
            || true
