<svg viewBox="0 0 920 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Four representative corpus sizes — 200, 8k, 25k, 100k Neurons — plotted on a log axis with each tier's ingest, lint, queue, and infrastructure state rendered as a stacked indicator column.">
  <text x="460" y="32" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.55" letter-spacing="1.5">FOUR TIERS ON A LOG AXIS</text>

  <!-- Baseline axis -->
  <line x1="80" y1="360" x2="840" y2="360" stroke="currentColor" stroke-width="1.2"/>

  <!-- Log-axis tick marks -->
  <g stroke="currentColor" stroke-width="0.6" opacity="0.5">
    <line x1="140" y1="360" x2="140" y2="368"/>
    <line x1="360" y1="360" x2="360" y2="368"/>
    <line x1="560" y1="360" x2="560" y2="368"/>
    <line x1="780" y1="360" x2="780" y2="368"/>
  </g>

  <!-- Axis labels -->
  <g font-family="monospace" font-size="10" fill="currentColor" text-anchor="middle" letter-spacing="0.5">
    <text x="140" y="382">200</text>
    <text x="360" y="382">8,000</text>
    <text x="560" y="382">25,000</text>
    <text x="780" y="382">100,000</text>
  </g>
  <text x="460" y="415" font-family="monospace" font-size="10" fill="currentColor" text-anchor="middle" opacity="0.7" letter-spacing="0.5">NEURONS IN CORPUS</text>

  <!-- ═══════════ TIER 1 — 200 ═══════════ -->
  <!-- Proportional circle: radius by log scale. log(200)≈2.3 -->
  <g transform="translate(140, 340)">
    <!-- Corpus circle -->
    <circle cx="0" cy="0" r="10" fill="none" stroke="currentColor" stroke-width="1.4"/>
    <circle cx="0" cy="0" r="2" fill="#e8a87c"/>

    <!-- Workload bars stacked above baseline -->
    <!-- ingest -->
    <rect x="-30" y="-32" width="60" height="4" fill="none" stroke="currentColor" stroke-width="1"/>
    <text x="-36" y="-28" font-family="monospace" font-size="8" fill="currentColor" text-anchor="end" opacity="0.7">i</text>
    <!-- lint -->
    <rect x="-30" y="-44" width="60" height="4" fill="none" stroke="currentColor" stroke-width="1"/>
    <text x="-36" y="-40" font-family="monospace" font-size="8" fill="currentColor" text-anchor="end" opacity="0.7">l</text>
    <!-- queue -->
    <rect x="-30" y="-56" width="60" height="4" fill="none" stroke="currentColor" stroke-width="1"/>
    <text x="-36" y="-52" font-family="monospace" font-size="8" fill="currentColor" text-anchor="end" opacity="0.7">q</text>

    <!-- Infra square -->
    <rect x="-8" y="-88" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.2"/>

    <!-- Tier label above -->
    <text x="0" y="-104" font-family="monospace" font-size="10" fill="currentColor" text-anchor="middle" letter-spacing="0.5">BASELINE</text>
  </g>

  <!-- ═══════════ TIER 2 — 8k ═══════════ -->
  <g transform="translate(360, 340)">
    <circle cx="0" cy="0" r="16" fill="none" stroke="currentColor" stroke-width="1.4"/>
    <circle cx="0" cy="0" r="3" fill="#e8a87c"/>

    <!-- ingest: still default -->
    <rect x="-34" y="-38" width="68" height="4" fill="none" stroke="currentColor" stroke-width="1"/>
    <text x="-40" y="-34" font-family="monospace" font-size="8" fill="currentColor" text-anchor="end" opacity="0.7">i</text>
    <!-- lint: sampler active (dashed + amber stripe) -->
    <rect x="-34" y="-50" width="68" height="4" fill="none" stroke="#e8a87c" stroke-width="1.2" stroke-dasharray="3 2"/>
    <line x1="-34" y1="-48" x2="34" y2="-48" stroke="#e8a87c" stroke-width="2" opacity="0.6"/>
    <text x="-40" y="-46" font-family="monospace" font-size="8" fill="currentColor" text-anchor="end" opacity="0.7">l</text>
    <!-- queue: filters matter (single amber tick mark) -->
    <rect x="-34" y="-62" width="68" height="4" fill="none" stroke="currentColor" stroke-width="1"/>
    <line x1="8" y1="-62" x2="8" y2="-58" stroke="#e8a87c" stroke-width="1.5"/>
    <text x="-40" y="-58" font-family="monospace" font-size="8" fill="currentColor" text-anchor="end" opacity="0.7">q</text>

    <!-- Infra: perf-2x → slightly larger square with inner dot -->
    <rect x="-10" y="-96" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.2"/>
    <circle cx="0" cy="-86" r="1.5" fill="currentColor"/>

    <text x="0" y="-112" font-family="monospace" font-size="10" fill="currentColor" text-anchor="middle" letter-spacing="0.5">SAMPLER</text>
  </g>

  <!-- ═══════════ TIER 3 — 25k ═══════════ -->
  <g transform="translate(560, 340)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="currentColor" stroke-width="1.4"/>
    <circle cx="0" cy="0" r="4" fill="#e8a87c"/>

    <!-- ingest: default -->
    <rect x="-38" y="-44" width="76" height="4" fill="none" stroke="currentColor" stroke-width="1"/>
    <text x="-44" y="-40" font-family="monospace" font-size="8" fill="currentColor" text-anchor="end" opacity="0.7">i</text>
    <!-- lint: sampler + parallel haiku (double amber line) -->
    <rect x="-38" y="-56" width="76" height="4" fill="none" stroke="#e8a87c" stroke-width="1.2" stroke-dasharray="3 2"/>
    <line x1="-38" y1="-54" x2="38" y2="-54" stroke="#e8a87c" stroke-width="2" opacity="0.6"/>
    <line x1="-38" y1="-52" x2="38" y2="-52" stroke="#e8a87c" stroke-width="1" opacity="0.45"/>
    <text x="-44" y="-52" font-family="monospace" font-size="8" fill="currentColor" text-anchor="end" opacity="0.7">l</text>
    <!-- queue: roles required — three amber seat ticks -->
    <rect x="-38" y="-68" width="76" height="4" fill="none" stroke="currentColor" stroke-width="1"/>
    <line x1="-20" y1="-68" x2="-20" y2="-64" stroke="#e8a87c" stroke-width="1.5"/>
    <line x1="0" y1="-68" x2="0" y2="-64" stroke="#e8a87c" stroke-width="1.5"/>
    <line x1="20" y1="-68" x2="20" y2="-64" stroke="#e8a87c" stroke-width="1.5"/>
    <text x="-44" y="-64" font-family="monospace" font-size="8" fill="currentColor" text-anchor="end" opacity="0.7">q</text>

    <!-- Infra: perf-4x → larger square with quadrants -->
    <rect x="-12" y="-104" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.2"/>
    <line x1="0" y1="-104" x2="0" y2="-80" stroke="currentColor" stroke-width="0.6" opacity="0.5"/>
    <line x1="-12" y1="-92" x2="12" y2="-92" stroke="currentColor" stroke-width="0.6" opacity="0.5"/>

    <text x="0" y="-120" font-family="monospace" font-size="10" fill="currentColor" text-anchor="middle" letter-spacing="0.5">ROLES</text>
  </g>

  <!-- ═══════════ TIER 4 — 100k ═══════════ -->
  <g transform="translate(780, 340)">
    <circle cx="0" cy="0" r="30" fill="none" stroke="currentColor" stroke-width="1.4"/>
    <circle cx="0" cy="0" r="6" fill="#e8a87c"/>
    <!-- Inner rings hinting at sub-clusters -->
    <circle cx="0" cy="0" r="18" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.4"/>

    <!-- ingest: context-select tuned (single amber mark) -->
    <rect x="-42" y="-52" width="84" height="4" fill="none" stroke="currentColor" stroke-width="1"/>
    <line x1="0" y1="-52" x2="0" y2="-48" stroke="#e8a87c" stroke-width="1.5"/>
    <text x="-48" y="-48" font-family="monospace" font-size="8" fill="currentColor" text-anchor="end" opacity="0.7">i</text>
    <!-- lint: sampler + multi-lane (3 amber lines) -->
    <rect x="-42" y="-64" width="84" height="4" fill="none" stroke="#e8a87c" stroke-width="1.2" stroke-dasharray="3 2"/>
    <line x1="-42" y1="-62" x2="42" y2="-62" stroke="#e8a87c" stroke-width="2" opacity="0.6"/>
    <line x1="-42" y1="-60" x2="42" y2="-60" stroke="#e8a87c" stroke-width="1" opacity="0.45"/>
    <line x1="-42" y1="-58" x2="42" y2="-58" stroke="#e8a87c" stroke-width="1" opacity="0.3"/>
    <text x="-48" y="-58" font-family="monospace" font-size="8" fill="currentColor" text-anchor="end" opacity="0.7">l</text>
    <!-- queue: auto-routing + grouping (amber arrows fanning out) -->
    <rect x="-42" y="-76" width="84" height="4" fill="none" stroke="currentColor" stroke-width="1"/>
    <line x1="-28" y1="-76" x2="-28" y2="-72" stroke="#e8a87c" stroke-width="1.5"/>
    <line x1="-14" y1="-76" x2="-14" y2="-72" stroke="#e8a87c" stroke-width="1.5"/>
    <line x1="0" y1="-76" x2="0" y2="-72" stroke="#e8a87c" stroke-width="1.5"/>
    <line x1="14" y1="-76" x2="14" y2="-72" stroke="#e8a87c" stroke-width="1.5"/>
    <line x1="28" y1="-76" x2="28" y2="-72" stroke="#e8a87c" stroke-width="1.5"/>
    <text x="-48" y="-72" font-family="monospace" font-size="8" fill="currentColor" text-anchor="end" opacity="0.7">q</text>

    <!-- Infra: perf-8x with read-replica (primary + satellite) -->
    <rect x="-14" y="-112" width="28" height="22" fill="none" stroke="currentColor" stroke-width="1.2"/>
    <line x1="-4" y1="-112" x2="-4" y2="-90" stroke="currentColor" stroke-width="0.6" opacity="0.5"/>
    <line x1="6" y1="-112" x2="6" y2="-90" stroke="currentColor" stroke-width="0.6" opacity="0.5"/>
    <rect x="20" y="-104" width="12" height="10" fill="none" stroke="currentColor" stroke-width="0.9" opacity="0.7"/>
    <line x1="14" y1="-99" x2="20" y2="-99" stroke="currentColor" stroke-width="0.6" stroke-dasharray="2 2" opacity="0.6"/>

    <text x="0" y="-128" font-family="monospace" font-size="10" fill="currentColor" text-anchor="middle" letter-spacing="0.5">FEDERATED</text>
  </g>

  <!-- ═══════════ LEGEND ═══════════ -->
  <g transform="translate(80, 74)" font-family="monospace" font-size="9" fill="currentColor" opacity="0.72">
    <text x="0" y="0" letter-spacing="1" opacity="0.55">LEGEND</text>
    <g transform="translate(0, 14)">
      <text x="18" y="4">i — ingest · l — lint · q — queue</text>
    </g>
    <g transform="translate(0, 28)">
      <rect x="0" y="-3" width="14" height="4" fill="none" stroke="currentColor" stroke-width="1"/>
      <text x="18" y="4">default path</text>
    </g>
    <g transform="translate(0, 42)">
      <rect x="0" y="-3" width="14" height="4" fill="none" stroke="#e8a87c" stroke-width="1.2" stroke-dasharray="3 2"/>
      <line x1="0" y1="-1" x2="14" y2="-1" stroke="#e8a87c" stroke-width="1.2" opacity="0.6"/>
      <text x="18" y="4">sampler / bounded pass</text>
    </g>
    <g transform="translate(0, 56)">
      <line x1="0" y1="-1" x2="4" y2="3" stroke="#e8a87c" stroke-width="1.5"/>
      <line x1="7" y1="-1" x2="7" y2="3" stroke="#e8a87c" stroke-width="1.5"/>
      <line x1="11" y1="-1" x2="11" y2="3" stroke="#e8a87c" stroke-width="1.5"/>
      <text x="18" y="4">amber ticks — new behaviour added at this tier</text>
    </g>
  </g>
</svg>
