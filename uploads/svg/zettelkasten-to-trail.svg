<svg viewBox="0 0 920 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Three-layer architectural correspondence between Luhmann's Zettelkasten (1950s) and Trail's compile-time engine (2026)">
  <!-- Title -->
  <text x="460" y="40" font-family="monospace" font-size="14" fill="currentColor" text-anchor="middle" opacity="0.6" letter-spacing="1.5">SAME THREE LAYERS, SEVENTY YEARS APART</text>

  <!-- ── LEFT COLUMN: Luhmann ───────────────────────────────────── -->
  <text x="180" y="80" font-family="monospace" font-size="13" fill="currentColor" text-anchor="middle" font-weight="bold" letter-spacing="0.8">NIKLAS LUHMANN, 1952–1998</text>
  <text x="180" y="98" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.55">90,000 cards · two slip-boxes · by hand</text>

  <!-- Layer 1: raw -->
  <rect x="50" y="120" width="260" height="60" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <text x="180" y="143" font-family="monospace" font-size="12" fill="currentColor" text-anchor="middle" font-weight="bold">Reading notes</text>
  <text x="180" y="162" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.6">books, papers, his own drafts</text>

  <!-- Layer 2: compiled -->
  <rect x="50" y="210" width="260" height="60" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <text x="180" y="233" font-family="monospace" font-size="12" fill="currentColor" text-anchor="middle" font-weight="bold">Permanent cards (Zettel)</text>
  <text x="180" y="252" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.6">numbered, linked, networked</text>

  <!-- Layer 3: schema/index -->
  <rect x="50" y="300" width="260" height="60" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <text x="180" y="323" font-family="monospace" font-size="12" fill="currentColor" text-anchor="middle" font-weight="bold">Index cards + rules</text>
  <text x="180" y="342" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.6">handwritten conventions, entry points</text>

  <!-- Vertical arrows Luhmann -->
  <g stroke="currentColor" stroke-width="1.2" fill="none" opacity="0.5">
    <line x1="180" y1="180" x2="180" y2="208"/>
    <polyline points="174,202 180,208 186,202"/>
    <line x1="180" y1="270" x2="180" y2="298"/>
    <polyline points="174,292 180,298 186,292"/>
  </g>

  <!-- ── BRIDGE ─────────────────────────────────────────────────── -->
  <text x="460" y="148" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.5" font-style="italic">↔</text>
  <text x="460" y="238" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.5" font-style="italic">↔</text>
  <text x="460" y="328" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.5" font-style="italic">↔</text>

  <text x="460" y="180" font-family="monospace" font-size="10" fill="#e8a87c" text-anchor="middle" letter-spacing="0.5">same role</text>
  <text x="460" y="270" font-family="monospace" font-size="10" fill="#e8a87c" text-anchor="middle" letter-spacing="0.5">same role</text>
  <text x="460" y="360" font-family="monospace" font-size="10" fill="#e8a87c" text-anchor="middle" letter-spacing="0.5">same role</text>

  <!-- ── RIGHT COLUMN: Trail ────────────────────────────────────── -->
  <text x="740" y="80" font-family="monospace" font-size="13" fill="#e8a87c" text-anchor="middle" font-weight="bold" letter-spacing="0.8">TRAIL, 2026</text>
  <text x="740" y="98" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.55">an LLM holds the pen for the bookkeeping</text>

  <!-- Layer 1: raw -->
  <rect x="610" y="120" width="260" height="60" fill="none" stroke="#e8a87c" stroke-width="1.4"/>
  <text x="740" y="143" font-family="monospace" font-size="12" fill="#e8a87c" text-anchor="middle" font-weight="bold">Sources</text>
  <text x="740" y="162" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.6">PDFs, articles, transcripts, web clips</text>

  <!-- Layer 2: compiled -->
  <rect x="610" y="210" width="260" height="60" fill="none" stroke="#e8a87c" stroke-width="1.4"/>
  <text x="740" y="233" font-family="monospace" font-size="12" fill="#e8a87c" text-anchor="middle" font-weight="bold">Neurons</text>
  <text x="740" y="252" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.6">cross-referenced markdown, version-traced</text>

  <!-- Layer 3: schema -->
  <rect x="610" y="300" width="260" height="60" fill="none" stroke="#e8a87c" stroke-width="1.4"/>
  <text x="740" y="323" font-family="monospace" font-size="12" fill="#e8a87c" text-anchor="middle" font-weight="bold">_schema.md + index</text>
  <text x="740" y="342" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.6">declarative rules, machine-readable</text>

  <!-- Vertical arrows Trail -->
  <g stroke="#e8a87c" stroke-width="1.4" fill="none" opacity="0.7">
    <line x1="740" y1="180" x2="740" y2="208"/>
    <polyline points="734,202 740,208 746,202"/>
    <line x1="740" y1="270" x2="740" y2="298"/>
    <polyline points="734,292 740,298 746,292"/>
  </g>

  <!-- Caption -->
  <text x="460" y="410" font-family="monospace" font-size="12" fill="currentColor" text-anchor="middle" opacity="0.55" letter-spacing="0.4">The architecture is identical. What changed in 2026 is who holds the pen for the middle layer.</text>
  <text x="460" y="430" font-family="monospace" font-size="12" fill="currentColor" text-anchor="middle" opacity="0.55" letter-spacing="0.4">Luhmann did it himself for 46 years. Trail does it for you while you read.</text>
</svg>
