<svg viewBox="0 0 920 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Three-layer architectural correspondence between Luhmann's Zettelkasten (1950s) and Trail's compile-time engine (2026)">
  <!-- Title -->
  <text x="460" y="40" font-family="monospace" font-size="14" fill="currentColor" text-anchor="middle" opacity="0.6" letter-spacing="1.5">SAME THREE LAYERS, SEVENTY YEARS APART</text>

  <!-- ── LEFT COLUMN: Luhmann ───────────────────────────────────── -->
  <text x="200" y="80" font-family="monospace" font-size="13" fill="currentColor" text-anchor="middle" font-weight="bold" letter-spacing="0.8">NIKLAS LUHMANN, 1952–1998</text>
  <text x="200" y="98" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.55">90,000 cards · two slip-boxes · by hand</text>

  <!-- Layer 1 -->
  <rect x="30" y="120" width="340" height="60" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <text x="200" y="143" font-family="monospace" font-size="12" fill="currentColor" text-anchor="middle" font-weight="bold">Reading notes</text>
  <text x="200" y="162" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.6">books, papers, his own drafts</text>

  <!-- Layer 2 -->
  <rect x="30" y="210" width="340" height="60" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <text x="200" y="233" font-family="monospace" font-size="12" fill="currentColor" text-anchor="middle" font-weight="bold">Permanent cards (Zettel)</text>
  <text x="200" y="252" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.6">numbered, linked, networked</text>

  <!-- Layer 3 -->
  <rect x="30" y="300" width="340" height="60" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <text x="200" y="323" font-family="monospace" font-size="12" fill="currentColor" text-anchor="middle" font-weight="bold">Index cards + rules</text>
  <text x="200" y="342" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.6">handwritten conventions, entry points</text>

  <!-- Vertical arrows (Luhmann column) -->
  <g stroke="currentColor" stroke-width="1.2" fill="none" opacity="0.5">
    <line x1="200" y1="180" x2="200" y2="208"/>
    <polyline points="194,202 200,208 206,202"/>
    <line x1="200" y1="270" x2="200" y2="298"/>
    <polyline points="194,292 200,298 206,292"/>
  </g>

  <!-- ── BRIDGE ─────────────────────────────────────────────────── -->
  <text x="460" y="148" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.5">↔</text>
  <text x="460" y="238" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.5">↔</text>
  <text x="460" y="328" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.5">↔</text>

  <text x="460" y="180" font-family="monospace" font-size="10" fill="#e8a87c" text-anchor="middle" letter-spacing="0.5">same role</text>
  <text x="460" y="270" font-family="monospace" font-size="10" fill="#e8a87c" text-anchor="middle" letter-spacing="0.5">same role</text>
  <text x="460" y="360" font-family="monospace" font-size="10" fill="#e8a87c" text-anchor="middle" letter-spacing="0.5">same role</text>

  <!-- ── RIGHT COLUMN: Trail ────────────────────────────────────── -->
  <text x="720" y="80" font-family="monospace" font-size="13" fill="#e8a87c" text-anchor="middle" font-weight="bold" letter-spacing="0.8">TRAIL, 2026</text>
  <text x="720" y="98" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.55">an LLM holds the pen for the bookkeeping</text>

  <!-- Layer 1 -->
  <rect x="550" y="120" width="340" height="60" fill="none" stroke="#e8a87c" stroke-width="1.4"/>
  <text x="720" y="143" font-family="monospace" font-size="12" fill="#e8a87c" text-anchor="middle" font-weight="bold">Sources</text>
  <text x="720" y="162" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.6">PDFs, articles, transcripts, web clips</text>

  <!-- Layer 2 -->
  <rect x="550" y="210" width="340" height="60" fill="none" stroke="#e8a87c" stroke-width="1.4"/>
  <text x="720" y="233" font-family="monospace" font-size="12" fill="#e8a87c" text-anchor="middle" font-weight="bold">Neurons</text>
  <text x="720" y="252" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.6">cross-referenced markdown, version-traced</text>

  <!-- Layer 3 -->
  <rect x="550" y="300" width="340" height="60" fill="none" stroke="#e8a87c" stroke-width="1.4"/>
  <text x="720" y="323" font-family="monospace" font-size="12" fill="#e8a87c" text-anchor="middle" font-weight="bold">_schema.md + index</text>
  <text x="720" y="342" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.6">declarative rules, machine-readable</text>

  <!-- Vertical arrows (Trail column) -->
  <g stroke="#e8a87c" stroke-width="1.4" fill="none" opacity="0.7">
    <line x1="720" y1="180" x2="720" y2="208"/>
    <polyline points="714,202 720,208 726,202"/>
    <line x1="720" y1="270" x2="720" y2="298"/>
    <polyline points="714,292 720,298 726,292"/>
  </g>

  <!-- Caption -->
  <text x="460" y="410" font-family="monospace" font-size="12" fill="currentColor" text-anchor="middle" opacity="0.55" letter-spacing="0.4">The architecture is identical. What changed in 2026 is who holds the pen for the middle layer.</text>
  <text x="460" y="430" font-family="monospace" font-size="12" fill="currentColor" text-anchor="middle" opacity="0.55" letter-spacing="0.4">Luhmann did it himself for 46 years. Trail does it for you while you read.</text>
</svg>
